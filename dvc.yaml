stages:
  data_ingestion:
    cmd: python src\data\data_ingestion.py
    deps:
    - src\data\data_ingestion.py
    outs:
    - data/raw
  feature_eng:
    cmd: python src\features\feature_eng.py
    deps:
    - data/raw
    - src\features\feature_eng.py
    outs:
    - data/interim
  model_evalute:
    cmd: src\models\model_evalute.py
    deps:
    - data/interim
    - src\models\model_evalute.py
    outs:
    - data/processed
